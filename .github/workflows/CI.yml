name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Run tests across Python versions
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"

      - name: Set up Python
        run: |
          uv python install ${{ matrix.python-version }}
          uv venv

      - name: Install Rust
        # Toolchain (channel + rustfmt) comes from rust-toolchain.toml — omit
        # `toolchain` so the action reads the file. Default rust-cache is safe to
        # share across the Python matrix: the abi3 build is version-agnostic
        # (one artifact for 3.12/3.13/3.14), so cached deps are identical.
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: "" # action defaults to -D warnings; don't block tests on warnings

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"

      - name: Build extension
        run: uv run maturin develop --release

      - name: Run tests
        run: uv run --with pytest pytest python/tests -m "not server_integration and not artifact_smoke" -s -vv

  server_smoke_linux:
    name: Server Smoke Linux
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: uv venv

      - name: Install Rust
        # Toolchain (channel + rustfmt) comes from rust-toolchain.toml — omit
        # `toolchain` so the action reads the file. Default rust-cache is safe to
        # share across the Python matrix: the abi3 build is version-agnostic
        # (one artifact for 3.12/3.13/3.14), so cached deps are identical.
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: "" # action defaults to -D warnings; don't block tests on warnings

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Build extension
        run: uv run maturin develop --release

      - name: Run platform smoke tests
        run: uv run pytest python/tests/integration -m platform_smoke -s -vv

  server_integration_linux:
    name: Server Integration Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv

      - name: Install Rust
        # Toolchain (channel + rustfmt) comes from rust-toolchain.toml — omit
        # `toolchain` so the action reads the file. Default rust-cache is safe to
        # share across the Python matrix: the abi3 build is version-agnostic
        # (one artifact for 3.12/3.13/3.14), so cached deps are identical.
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: "" # action defaults to -D warnings; don't block tests on warnings

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Build extension
        run: uv run maturin develop --release

      - name: Run server integration tests
        run: uv run pytest python/tests/integration -m "server_integration and not artifact_smoke" -s -vv

  platform_smoke:
    name: Platform Smoke ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest", "windows-latest"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: uv venv

      - name: Install Rust
        # Toolchain (channel + rustfmt) comes from rust-toolchain.toml — omit
        # `toolchain` so the action reads the file. Default rust-cache is safe to
        # share across the Python matrix: the abi3 build is version-agnostic
        # (one artifact for 3.12/3.13/3.14), so cached deps are identical.
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: "" # action defaults to -D warnings; don't block tests on warnings

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Build extension
        run: uv run maturin develop --release

      - name: Run platform smoke tests
        run: uv run pytest python/tests/integration -m platform_smoke -s -vv

  # Build wheels for Linux x86_64 (covers most Linux users including Arch)
  linux:
    name: Build wheels on Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Free disk space
        run: |
          docker system prune -af
          docker volume prune -f

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: x86_64
          args: --release --out dist --interpreter 3.12 3.13 3.14
          sccache: "true"
          manylinux: auto
          docker-options: --pull always

      - name: Upload wheels
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-linux-x86_64
          path: dist

  # Build wheels for macOS
  macos:
    name: Build wheels on macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: universal2-apple-darwin
          args: --release --out dist --interpreter 3.12 3.13 3.14
          sccache: "true"

      - name: Upload wheels
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-macos-universal2
          path: dist

  # Build wheels for Windows
  windows:
    name: Build wheels on Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: x64
          args: --release --out dist --interpreter 3.12 3.13 3.14
          sccache: "true"

      - name: Upload wheels
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-windows-x64
          path: dist

  # Build source distribution
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Free disk space
        run: |
          docker system prune -af
          docker volume prune -f

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-sdist
          path: dist

  # Validate all wheels
  validate:
    name: Validate wheels
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Install twine
        run: pip install twine

      - name: Check wheels with twine
        run: twine check --strict dist/*

      - name: List all wheels
        run: ls -lh dist/

  # Supply-chain gate: a vulnerable dep compiled into the wheel (Rust) or
  # resolved at install (Python) passes manual release review. This catches it;
  # it blocks release via `needs` below.
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ""

      - name: cargo audit (Rust deps in Cargo.lock)
        run: |
          cargo install cargo-audit --locked
          # RUSTSEC-2023-0071 (rsa Marvin attack): no fixed release exists. rsa is
          # transitive via jsonwebtoken, and the timing oracle targets RSA
          # private-key decryption, not the public-key path JWT verification uses.
          cargo audit --ignore RUSTSEC-2023-0071

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"

      - name: pip-audit (Python deps in uv.lock)
        run: |
          uv export --no-emit-project --no-dev --format requirements-txt --output-file audit-reqs.txt
          uvx pip-audit --requirement audit-reqs.txt --no-deps

  artifact_smoke:
    name: Artifact Smoke ${{ matrix.artifact-kind }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [linux, sdist]
    strategy:
      fail-fast: false
      matrix:
        artifact-kind: ["wheel", "sdist"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: uv venv

      - name: Install Rust
        # Toolchain (channel + rustfmt) comes from rust-toolchain.toml — omit
        # `toolchain` so the action reads the file. Default rust-cache is safe to
        # share across the Python matrix: the abi3 build is version-agnostic
        # (one artifact for 3.12/3.13/3.14), so cached deps are identical.
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: "" # action defaults to -D warnings; don't block tests on warnings

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Build extension
        run: uv run maturin develop --release

      - name: Download Linux wheel artifact
        if: matrix.artifact-kind == 'wheel'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: wheels-linux-x86_64
          path: dist

      - name: Download source artifact
        if: matrix.artifact-kind == 'sdist'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: wheels-sdist
          path: dist

      - name: Resolve artifact path
        id: artifact
        shell: bash
        run: |
          if [ "${{ matrix.artifact-kind }}" = "wheel" ]; then
            artifact_path=$(find dist -name 'django_bolt-*.whl' | head -n 1)
          else
            artifact_path=$(find dist -name 'django_bolt-*.tar.gz' | head -n 1)
          fi
          test -n "$artifact_path"
          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Run artifact smoke tests
        env:
          DJANGO_BOLT_ARTIFACT_PATH: ${{ steps.artifact.outputs.path }}
        run: uv run pytest python/tests/integration/test_artifact_smoke.py -m artifact_smoke -s -vv

  # Release to PyPI
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, validate, audit, server_smoke_linux, server_integration_linux, platform_smoke, artifact_smoke]
    environment:
      name: pypi
      url: https://pypi.org/project/django-bolt/
    permissions:
      id-token: write # Required for trusted publishing
      contents: write # Required for GitHub release

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Install uv
        run: pip install uv

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
